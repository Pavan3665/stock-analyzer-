<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stock Verdict App</title>
<style>
body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: Arial;
    text-align: center;
}
input {
    padding: 10px;
    width: 200px;
    border-radius: 5px;
}
button {
    padding: 10px;
    background: #238636;
    color: white;
    border: none;
    border-radius: 5px;
}
.verdict {
    font-size: 40px;
    margin-top: 20px;
}
.green { color: #2ecc71; }
.red { color: #e74c3c; }
.amber { color: #f39c12; }
</style>
</head>

<body>

<h1>📊 Stock Analyzer</h1>

<input id="ticker" placeholder="Enter NSE Ticker (e.g. BAJFINANCE)">
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<!-- TradingView Widget -->
<div id="tv"></div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
function analyze() {
    let ticker = document.getElementById("ticker").value.toUpperCase();

    let verdict = "AMBER";
    let className = "amber";

    let price = 7200; // Example placeholder

    let allocation = `
        Buy ₹5000 now<br>
        Buy ₹5000 at ₹6800<br>
        Buy ₹5000 at ₹6400
    `;

    document.getElementById("result").innerHTML = `
        <div class="verdict ${className}">${verdict}</div>
        <h3>Investment Plan (₹15,000)</h3>
        <p>${allocation}</p>
    `;

    new TradingView.widget({
        "container_id": "tv",
        "symbol": "NSE:" + ticker,
        "interval": "D",
        "theme": "dark",
        "style": "1",
        "width": "100%",
        "height": "500"
    });
}
</script>

</body>
</html>
